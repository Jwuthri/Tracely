name: Tracely regression gate

# Gate every PR on the agent's regression suite: a PR that changes the agent must not
# reproduce any promoted production failure (fail-to-pass), or the check fails.

on:
  pull_request:

permissions:
  contents: read
  statuses: write        # post the tracely/regression-gate commit status (the blocking check)
  pull-requests: write   # upsert the results comment on the PR

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `tracely replay` re-runs the agent on every promoted case's recorded input, emits the
      # ci traces, and gates the PR in one step — exits non-zero on FAIL and, inside Actions,
      # posts the commit status + PR comment. Swap weather_agent:run for your real agent
      # entrypoint (or use --cmd "..." for a non-Python agent). run_broken demos a FAIL.
      - name: Tracely replay + gate
        env:
          TRACELY_API: ${{ secrets.TRACELY_API }}
          TRACELY_KEY: ${{ secrets.TRACELY_KEY }}
          TRACELY_WEB_URL: ${{ secrets.TRACELY_WEB_URL }}
          PYTHONPATH: sdk/examples
        run: |
          pip install ./sdk
          tracely replay planner --entrypoint weather_agent:run
